name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build musl (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            arch: aarch64
    steps:
      - name: Checkout machbus
        uses: actions/checkout@v4
        with:
          path: machbus

      - name: Checkout sibling path dependencies
        run: |
          git clone --depth 1 https://codeberg.org/robolibs/wirebit.git wirebit
          git clone --depth 1 https://codeberg.org/robolibs/concord.git concord

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Build static musl binary
        working-directory: machbus
        run: cargo zigbuild --release -p machbus-cli --target ${{ matrix.target }}

      - name: Package
        run: |
          cd machbus
          tar czf machbus-linux-${{ matrix.arch }}.tar.gz \
            -C target/${{ matrix.target }}/release machbus

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: machbus-linux-${{ matrix.arch }}
          path: machbus/machbus-linux-${{ matrix.arch }}.tar.gz

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
