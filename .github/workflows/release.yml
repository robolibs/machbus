name: release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Linux GNU (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
            runner: ubuntu-latest
            apt_packages: libudev-dev
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            runner: ubuntu-24.04-arm
            apt_packages: libudev-dev
    steps:
      - name: Checkout machbus
        uses: actions/checkout@v4
        with:
          path: machbus

      - name: Checkout sibling path dependencies
        run: |
          git clone --depth 1 https://codeberg.org/robolibs/wirebit.git wirebit
          git clone --depth 1 https://codeberg.org/robolibs/concord.git concord

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config ${{ matrix.apt_packages }}

      - name: Build Linux GNU binary
        working-directory: machbus
        run: cargo build --release -p machbus-cli --target ${{ matrix.target }}

      - name: Package
        run: |
          cd machbus
          tar czf machbus-linux-${{ matrix.arch }}-gnu.tar.gz \
            -C target/${{ matrix.target }}/release machbus

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: machbus-linux-${{ matrix.arch }}-gnu
          path: machbus/machbus-linux-${{ matrix.arch }}-gnu.tar.gz

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
