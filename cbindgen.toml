language = "C"
include_guard = "MACHBUS_H"
cpp_compat = true
documentation = true
style = "type"
no_includes = false

[parse]
parse_deps = false

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true

[export]
item_types = ["enums", "structs", "opaque", "functions"]

# Expand declarative macros (e.g. `pod_codec!`) so the macro-generated
# `#[repr(C)]` codec structs + `extern "C"` functions appear in the header.
# Requires crate-mode generation (`cbindgen --crate machbus`) with
# RUSTC_BOOTSTRAP=1 on a stable toolchain (see the `bind-c` make target).
[parse.expand]
crates = ["machbus"]
features = ["default"]
