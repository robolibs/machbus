[book]
title = "machbus"
description = "A practical guide to using machbus for ISOBUS, J1939, and NMEA workflows"
authors = ["machbus contributors"]
language = "en"
src = "src"

[build]
build-dir = "../target/mdbook/machbus"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://codeberg.org/robolibs/machbus"
edit-url-template = "https://codeberg.org/robolibs/machbus/_edit/main/book/{path}"
additional-css = []

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
